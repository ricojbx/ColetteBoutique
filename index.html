<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colette Boutique — Curated Goods · Boise, ID</title>
  <meta name="description" content="Colette Boutique — a curated gift shop in Boise, Idaho. One-of-a-kind finds for one-of-a-kind friends." />

  <!-- Open Graph / social preview -->
  <meta property="og:title" content="Colette Boutique" />
  <meta property="og:description" content="Curated goods · Boise, ID. One-of-a-kind finds for one-of-a-kind friends." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="assets/brand-board.jpg" />

  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="apple-touch-icon" href="assets/silhouette.jpg" />

  <!-- Fonts: Cormorant Garamond (title), Montserrat (details) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css?v=3" />
</head>
<body>
  <main>
    <!-- HERO -->
    <section class="hero" aria-labelledby="brand-title">
      <img class="hero__silhouette" src="assets/silhouette.jpg" alt="" aria-hidden="true" />

      <div class="hero__content">
        <p class="hero__eyebrow">Curated Goods · Boise, ID</p>
        <h1 id="brand-title" class="hero__title">Colette Boutique</h1>

        <span class="hero__divider" aria-hidden="true"></span>

        <p class="hero__tagline">One-of-a-kind finds for one-of-a-kind friends.</p>

        <address class="hero__details">
          <a class="detail" href="https://maps.google.com/?q=3122+S+Bown+Way,+Boise,+ID+83706"
             target="_blank" rel="noopener">
            3122 S Bown Way, Boise, ID 83706
          </a>

          <div class="hero__hours">
            <span class="hours__label">Store Hours</span>
            <span class="hours__line">Monday · Closed</span>
            <span class="hours__line">Tuesday – Friday · 11AM – 6PM</span>
            <span class="hours__line">Saturday · 11AM – 5PM</span>
            <span class="hours__line">Sunday · 11AM – 3PM</span>
          </div>

          <a class="detail detail--ig" href="https://instagram.com/colette_theboutique"
             target="_blank" rel="noopener">
            <svg class="detail__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
              <rect x="2" y="2" width="20" height="20" rx="5.5" ry="5.5" />
              <circle cx="12" cy="12" r="4.5" />
              <circle cx="17.6" cy="6.4" r="1.2" fill="currentColor" stroke="none" />
            </svg>
            <span>@colette_theboutique</span>
          </a>
        </address>
      </div>
    </section>

    <!-- ACCENT STRIP: Colette striped wordmark -->
    <section class="strip" id="strip" aria-label="Colette Boutique">
      <img class="strip__image" src="assets/logo-stripes.jpg"
           alt="Colette wordmark on a soft pink-and-cream striped background." />
    </section>
  </main>

  <footer class="footer">
    <p>&copy; <span id="year">2026</span> Colette Boutique · Boise, Idaho</p>
  </footer>

  <script src="script.js?v=2"></script>
</body>
</html>
